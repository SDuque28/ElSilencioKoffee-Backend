          format: int64
          example: 2
        username:
          type: string
          example: juan
        email:
          type: string
          format: email
          example: juan@mail.com
        activo:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-11T09:30:00'
    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
          example: juan-updated
        email:
          type: string
          format: email
          example: juan.updated@mail.com
        activo:
          type: boolean
          example: false
