openapi: 3.0.3
info:
  title: El Silencio Koffee Backend API
  version: 0.1.0
  description: |
    Canonical OpenAPI contract for the currently implemented Spring Boot backend.

    Scope included in this specification:
    - authentication
    - users
    - roles
    - user-role assignments
    - orders

    Important notes:
    - This specification documents the current live backend behavior, which is still exposed on unversioned root-level paths such as `/auth` and `/orders`.
    - The project's recommended future public API base path is `/api/v1/...`, but those versioned paths are not yet implemented in code.
    - Planned modules such as products, cart, dashboard, production, environment monitoring, inventory, and itemized order details are intentionally excluded from this live spec because they are not implemented in the backend yet.
    - Some endpoints are marked as partially aligned in descriptions where the backend behavior, frontend needs, or project documentation are not fully in sync.
servers:
  - url: http://localhost:8080
    description: Current local Spring Boot backend with live unversioned routes
tags:
  - name: Auth
    description: Authentication and password-management endpoints
  - name: Users
    description: User administration endpoints currently restricted to administrators
  - name: Roles
    description: Role administration endpoints
  - name: User Roles
    description: User-to-role assignment endpoints
  - name: Orders
    description: Order creation and retrieval endpoints
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      description: |
        Creates a new user account and returns an authentication payload.

        Notes:
        - This endpoint is public.
        - The backend attempts to assign `ROLE_USER` if that role exists in the database.
        - The response does not include a refresh token or nested user object.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  username: juan
                  email: juan@mail.com
                  password: "123456"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  value:
                    token: jwt_token
                    username: juan
                    email: juan@mail.com
                    roles:
                      - ROLE_USER
        '400':
          description: Business validation error such as duplicate username or email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                duplicateUsername:
                  value:
                    message: Username already taken juan
                duplicateEmail:
                  value:
                    message: Email already taken juan@mail.com
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates a user with username and password and returns a JWT response.

        Notes:
        - This endpoint is public.
        - Authentication failures currently result in `401` with no response body from Spring Security.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: juan
                  password: "123456"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  value:
                    token: jwt_token
                    username: juan
                    email: juan@mail.com
                    roles:
                      - ROLE_USER
        '401':
          description: Authentication failed
  /auth/password-recovery:
    post:
      tags: [Auth]
      summary: Recover password
      description: |
        Updates a user's password when username and email match an existing account.

        Notes:
        - This endpoint is public.
        - The backend treats lookup failures as `400` business errors, not `404`.
      operationId: recoverPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRecoveryRequest'
            examples:
              default:
                value:
                  username: juan
                  email: juan@mail.com
                  newPassword: "new-secret"
                  confirmPassword: "new-secret"
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Password updated successfully
        '400':
          description: Invalid request or no matching user found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                noMatch:
                  value:
                    message: No user found with the provided username and email
                mismatch:
                  value:
                    message: New password and confirmation do not match
  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      description: |
        Changes the password of the authenticated user.

        Notes:
        - This endpoint currently uses `POST`, not `PATCH`.
        - Authentication is required through Bearer JWT.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            examples:
              default:
                value:
                  currentPassword: "123456"
                  newPassword: "new-secret"
                  confirmPassword: "new-secret"
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Password changed successfully
        '400':
          description: Invalid password change request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                incorrectCurrentPassword:
                  value:
                    message: Current password is incorrect
        '401':
          description: Missing or invalid authentication token
  /users:
    get:
      tags: [Users]
      summary: List users
      description: |
        Returns all users for administrators.

        Behavior:
        - If `page` and `limit` are omitted, the response is a plain array of users.
        - If `page` and `limit` are both provided, the response is a Spring Page object.
        - If only one of `page` or `limit` is provided, the backend returns `400`.
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Users returned successfully
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
                  - $ref: '#/components/schemas/UserPage'
              examples:
                unpaginated:
                  value:
                    - id: 1
                      username: admin
                      email: admin@mail.com
                      activo: true
                      createdAt: '2026-04-10T12:00:00'
                    - id: 2
                      username: juan
                      email: juan@mail.com
                      activo: true
                      createdAt: '2026-04-11T09:30:00'
                paginated:
                  value:
                    content:
                      - id: 1
                        username: admin
                        email: admin@mail.com
                        activo: true
                        createdAt: '2026-04-10T12:00:00'
                    totalElements: 1
                    totalPages: 1
                    size: 10
                    number: 0
                    first: true
                    last: true
                    empty: false
                    numberOfElements: 1
        '400':
          description: Invalid pagination request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                pageLimitTogether:
                  value:
                    message: Page and limit must be provided together
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      description: Returns a single user for administrators.
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                success:
                  value:
                    id: 2
                    username: juan
                    email: juan@mail.com
                    activo: true
                    createdAt: '2026-04-11T09:30:00'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                notFound:
                  value:
                    message: User not found 2
    patch:
      tags: [Users]
      summary: Update user
      description: |
        Updates username, email, and/or active flag for a specific user.

        Notes:
        - All request fields are optional in the DTO.
        - The backend applies business validation in the service layer.
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            examples:
              updateEmail:
                value:
                  email: new-address@mail.com
              deactivate:
                value:
                  activo: false
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                duplicateEmail:
                  value:
                    message: Email already taken new-address@mail.com
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
    delete:
      tags: [Users]
      summary: Soft delete user
      description: Sets `activo` to `false` for the target user.
      operationId: softDeleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: User deactivated successfully
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
  /users/{id}/orders:
    get:
      tags: [Users, Orders]
      summary: Get orders by user id
      description: Returns all orders for a specific user. Administrator only.
      operationId: listOrdersByUserId
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Orders returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
  /users/me/orders:
    get:
      tags: [Orders]
      summary: Get current user's orders
      description: Returns all orders belonging to the authenticated user with role `USER`.
      operationId: listMyOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks the required role
  /roles:
    get:
      tags: [Roles]
      summary: List roles
      description: Returns all roles. Administrator only.
      operationId: listRoles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Roles returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
    post:
      tags: [Roles]
      summary: Create role
      description: Creates a role. Administrator only.
      operationId: createRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
            examples:
              default:
                value:
                  nombre: ROLE_ADMIN
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          description: Malformed request body or persistence error surfaced as bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
  /roles/{id}:
    get:
      tags: [Roles]
      summary: Get role by id
      description: Returns a role by id. Administrator only.
      operationId: getRoleById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: Role returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: Role not found
    put:
      tags: [Roles]
      summary: Update role
      description: Updates role name. Administrator only.
      operationId: updateRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateRequest'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: Role not found
    delete:
      tags: [Roles]
      summary: Delete role
      description: Deletes a role by id. Administrator only.
      operationId: deleteRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Role deleted successfully
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: Role not found
  /usuario-roles:
    post:
      tags: [User Roles]
      summary: Assign role to user
      description: |
        Creates a user-role assignment. Administrator only.

        Notes:
        - The public route name is currently mixed-language (`usuario-roles`).
        - Invalid foreign keys are not explicitly normalized by controller-level validation.
      operationId: assignUserRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleCreateRequest'
            examples:
              default:
                value:
                  usuarioId: 2
                  rolId: 1
      responses:
        '201':
          description: User-role assignment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoleResponse'
        '400':
          description: Malformed request body or business/persistence error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
  /usuario-roles/usuario/{usuarioId}:
    get:
      tags: [User Roles]
      summary: List roles for a user
      description: Returns all user-role assignments for the specified user. Administrator only.
      operationId: listUserRolesByUserId
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UsuarioIdPath'
      responses:
        '200':
          description: User-role assignments returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRoleResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
  /usuario-roles/rol/{rolId}:
    get:
      tags: [User Roles]
      summary: List users for a role
      description: Returns all user-role assignments for the specified role. Administrator only.
      operationId: listUserRolesByRoleId
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: User-role assignments returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRoleResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
  /usuario-roles/{usuarioId}/{rolId}:
    delete:
      tags: [User Roles]
      summary: Delete user-role assignment
      description: Deletes a user-role assignment by composite key. Administrator only.
      operationId: deleteUserRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UsuarioIdPath'
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: User-role assignment deleted successfully
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
        '404':
          description: User-role assignment not found
  /orders:
    post:
      tags: [Orders]
      summary: Create order
      description: |
        Creates a new order for the authenticated user.

        Partial alignment note:
        - The current backend accepts only `totalAmount`.
        - The current frontend checkout flow assembles `items[]`, not `totalAmount`.
        - The database schema already suggests future itemized order details through `orders_details`, but that is not implemented in the backend yet.
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            examples:
              currentBackendContract:
                value:
                  totalAmount: 54000.00
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                success:
                  value:
                    id: 123
                    userId: 5
                    orderDate: '2026-04-20T10:30:00'
                    totalAmount: 54000.00
                    status: NON PAID
        '400':
          description: Invalid order request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                totalRequired:
                  value:
                    message: Total amount is required
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks the required role
    get:
      tags: [Orders]
      summary: List all orders
      description: |
        Returns all orders for administrators.

        Behavior:
        - If `page` and `limit` are omitted, the response is a plain array.
        - If `page` and `limit` are both provided, the response is a Spring Page object.
        - If only one is provided, the backend returns `400`.
      operationId: listOrders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Orders returned successfully
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/OrderResponse'
                  - $ref: '#/components/schemas/OrderPage'
              examples:
                unpaginated:
                  value:
                    - id: 1
                      userId: 2
                      orderDate: '2026-04-10T12:00:00'
                      totalAmount: 54000.00
                      status: NON PAID
                paginated:
                  value:
                    content:
                      - id: 1
                        userId: 2
                        orderDate: '2026-04-10T12:00:00'
                        totalAmount: 54000.00
                        status: NON PAID
                    totalElements: 1
                    totalPages: 1
                    size: 10
                    number: 0
                    first: true
                    last: true
                    empty: false
                    numberOfElements: 1
        '400':
          description: Invalid pagination request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks administrator role
  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by id
      description: |
        Returns a single order for the authenticated user.

        Notes:
        - The endpoint currently requires authentication.
        - A `USER` can only retrieve orders that belong to them.
        - The controller annotation allows both `USER` and `ADMIN`, but the service path currently resolves by username ownership.
      operationId: getOrderById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPath'
      responses:
        '200':
          description: Order returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks the required role
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                notFound:
                  value:
                    message: Order not found 123
  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order status
      description: |
        Updates the status of an order.

        Partial alignment note:
        - The current implementation allows both `USER` and `ADMIN`.
        - Project documentation and product intent suggest this should likely be administrator-only in the future.
      operationId: updateOrderStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequest'
            examples:
              paid:
                value:
                  status: PAID
              nonPaid:
                value:
                  status: NON PAID
      responses:
        '200':
          description: Order status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid status update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
              examples:
                missingStatus:
                  value:
                    message: Order status is required
                invalidStatus:
                  value:
                    message: Invalid order status SHIPPED
        '401':
          description: Missing or invalid authentication token
        '403':
          description: Authenticated user lacks the required role
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessageError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Page number starting at 1. Must be provided together with `limit`.
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Page size. Must be provided together with `page`.
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: User identifier
    OrderIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Order identifier
    RoleIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Role identifier
    UsuarioIdPath:
      name: usuarioId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: User identifier in user-role routes
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: juan
        password:
          type: string
          example: "123456"
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: juan
        email:
          type: string
          format: email
          example: juan@mail.com
        password:
          type: string
          example: "123456"
    PasswordRecoveryRequest:
      type: object
      required: [username, email, newPassword, confirmPassword]
      properties:
        username:
          type: string
          example: juan
        email:
          type: string
          format: email
          example: juan@mail.com
        newPassword:
          type: string
          example: new-secret
        confirmPassword:
          type: string
          example: new-secret
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword, confirmPassword]
      properties:
        currentPassword:
          type: string
          example: "123456"
        newPassword:
          type: string
          example: new-secret
        confirmPassword:
          type: string
          example: new-secret
    AuthResponse:
      type: object
      required: [token, username, email, roles]
      properties:
        token:
          type: string
          example: jwt_token
        username:
          type: string
          example: juan
        email:
          type: string
          format: email
          example: juan@mail.com
        roles:
          type: array
          items:
            type: string
          example:
            - ROLE_USER
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Password changed successfully
    ApiMessageError:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Total amount is required
    UserResponse:
      type: object
      required: [id, username, email, activo]
